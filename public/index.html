<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albion Market Insights</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>Albion Market Insights</h1>
      <div class="subtitle">Dashboard privado de análise de mercado</div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar item (ex: capuz, espada, poção...)" autocomplete="off" />
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="tier-filter" id="tierFilter">
      <button data-tier="">T</button>
      <button data-tier="3">T3</button>
      <button data-tier="4">T4</button>
      <button data-tier="5">T5</button>
      <button data-tier="6">T6</button>
      <button data-tier="7">T7</button>
      <button data-tier="8">T8</button>
    </div>
    <button id="syncBtn" class="sync-btn" title="Sincronizar watchlist com AODP">Sync AODP</button>
  </header>

  <div class="main" id="mainContent">
    <div class="panel" id="latestPanel">
      <h2>Preços Atuais</h2>
      <div class="empty-state" id="latestEmpty">
        <div class="icon">&#9876;</div>
        <p>Selecione um item para ver os preços por cidade</p>
      </div>
      <div id="latestContent" style="display:none"></div>
    </div>

    <div class="panel" id="statsPanel">
      <h2>Estatísticas</h2>
      <div class="empty-state" id="statsEmpty">
        <div class="icon">&#9733;</div>
        <p>Estatísticas aparecem aqui ao selecionar um item</p>
      </div>
      <div id="statsContent" style="display:none"></div>
    </div>

    <div class="panel history-panel" id="historyPanel">
      <h2>Histórico de Preços</h2>
      <div class="empty-state" id="historyEmpty">
        <div class="icon">&#9783;</div>
        <p>Gráfico do histórico de preços será exibido aqui</p>
      </div>
      <div id="historyContent" style="display:none"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
